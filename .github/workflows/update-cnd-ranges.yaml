name: Update Keenetic CDN Ranges (Release)

on:
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC
  workflow_dispatch: # manual trigger

permissions:
  contents: write # needed to push tags and create releases

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your own repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed to push tags

      - name: Clone the original CDN IP ranges repository
        run: |
          git clone --depth 1 https://github.com/123jjck/cdn-ip-ranges.git source-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run the original conversion script
        run: |
          cd source-repo
          # The script checks for GITHUB_ACTIONS – unset to bypass
          unset GITHUB_ACTIONS
          python scripts/convert_for_keenetic.py --all

      - name: Prepare release assets
        run: |
          # Copy all .bat files to a separate folder for upload
          mkdir -p release-assets
          cp source-repo/scripts/*.bat release-assets/

      - name: Create/update release with assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Set up git user for tag operations
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Use a fixed tag (force-update it to the current commit)
          TAG="cdn-ranges-latest"
          git tag -f "$TAG"
          git push -f origin "$TAG"

          # Delete existing release (if any) to avoid asset conflicts
          gh release delete "$TAG" -y || true

          # Create a new release with today's date as the title
          DATE=$(date -u +"%Y-%m-%d")
          gh release create "$TAG" \
            --title "Latest CDN Ranges ($DATE)" \
            --notes "Daily update from upstream CDN ranges. Generated on $DATE UTC." \
            release-assets/*.bat
