name: Update Keenetic CDN Ranges

on:
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC
  workflow_dispatch: # manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your own repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone the original CDN IP ranges repository
        run: |
          git clone --depth 1 https://github.com/123jjck/cdn-ip-ranges.git source-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run the original conversion script
        run: |
          cd source-repo
          # The script checks for GITHUB_ACTIONS and exits – unset it
          unset GITHUB_ACTIONS
          python scripts/convert_for_keenetic.py --all

      - name: Copy generated .bat files to your repo root
        run: |
          # The script writes *.bat files inside source-repo/
          cp source-repo/scripts/*.bat ./

      - name: Commit and push if changes exist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add *.bat

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Keenetic CDN ranges (daily, from cloned repo)"
            git push
          fi
